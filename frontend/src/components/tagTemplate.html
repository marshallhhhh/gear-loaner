<div style="text-align:center;font-family:sans-serif;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4%;box-sizing:border-box;">
  <div style="font-weight:700;font-size:5cqmin;margin-bottom:2%;line-height:1.2;word-break:break-word;">{{ Name }}</div>
  <img src="{{ QRCode }}" style="width:55%;height:auto;flex-shrink:1;min-height:0;" />
  <div style="font-family:monospace;font-size:3.5cqmin;margin-top:2%;">{{ ShortId }}</div>
  <div style="font-size:3cqmin;color:#666;margin-top:1%;">{{ Category }}</div>
</div>
